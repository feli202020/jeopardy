<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz-Editor – Jeopardy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Oswald:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e17;
    --surface: #1a1828;
    --surface2: #232134;
    --border: #2e2b45;
    --border-hover: #3e3b58;
    --gold: #f5c842;
    --gold-light: #fde68a;
    --gold-dim: rgba(245,200,66,.1);
    --green: #34d399;
    --red: #f87171;
    --text: #f0eeff;
    --text-muted: #7c7a96;
    --text-dim: #3a3858;
    --radius: 12px;
    --radius-sm: 8px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; -webkit-font-smoothing: antialiased; }

  /* ── TOPBAR ── */
  .topbar {
    height: 56px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 14px;
    flex-shrink: 0;
  }
  .topbar-back { color: var(--text-muted); text-decoration: none; font-size: .85rem; font-weight: 600; display: flex; align-items: center; gap: 4px; transition: color .15s; }
  .topbar-back:hover { color: var(--text); }
  .topbar-divider { width: 1px; height: 20px; background: var(--border); }
  .topbar-title-input {
    background: transparent;
    border: none;
    color: var(--text);
    font-size: 1rem;
    font-weight: 700;
    font-family: inherit;
    outline: none;
    flex: 1;
    min-width: 0;
  }
  .topbar-title-input::placeholder { color: var(--text-dim); }
  .topbar-right { margin-left: auto; display: flex; gap: 10px; }
  .btn {
    padding: 8px 18px;
    border-radius: var(--radius-sm);
    border: none;
    cursor: pointer;
    font-size: .875rem;
    font-weight: 700;
    font-family: inherit;
    transition: all .15s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .btn-primary { background: var(--gold); color: #0f0e17; }
  .btn-primary:hover { background: var(--gold-light); }
  .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--border); }
  .btn-danger-soft { background: rgba(248,113,113,.1); color: var(--red); border: 1px solid rgba(248,113,113,.2); }
  .btn-danger-soft:hover { background: rgba(248,113,113,.2); }
  .btn-sm { padding: 5px 12px; font-size: .8rem; }
  .btn:disabled { opacity: .35; cursor: not-allowed; }
  .save-status { font-size: .8rem; color: var(--text-muted); font-weight: 600; }
  .save-status.saved { color: var(--green); }

  /* ── LAYOUT ── */
  .editor-body { display: flex; flex: 1; overflow: hidden; }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 260px;
    flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-section { padding: 16px; border-bottom: 1px solid var(--border); }
  .sidebar-section-label { font-size: .7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); font-weight: 700; margin-bottom: 10px; }
  .cat-list { flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 4px; }
  .cat-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 9px 10px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: background .15s;
  }
  .cat-item:hover { background: var(--surface2); }
  .cat-item.active { background: var(--gold-dim); }
  .cat-item-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--border);
    flex-shrink: 0;
  }
  .cat-item.active .cat-item-dot { background: var(--gold); }
  .cat-item-name { flex: 1; font-size: .875rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cat-item-del { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: .85rem; padding: 2px 4px; border-radius: 4px; transition: color .15s; }
  .cat-item-del:hover { color: var(--red); }
  .sidebar-footer { padding: 12px 16px; border-top: 1px solid var(--border); }
  .preset-section { padding: 12px 16px; border-bottom: 1px solid var(--border); }
  .preset-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
  .preset-chip {
    padding: 4px 10px;
    border-radius: 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
    font-size: .75rem;
    font-weight: 600;
    cursor: pointer;
    transition: all .15s;
    color: var(--text-muted);
  }
  .preset-chip:hover { border-color: var(--gold); color: var(--gold); }

  /* ── MAIN ── */
  .main-panel { flex: 1; overflow-y: auto; padding: 24px; }
  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 12px; color: var(--text-muted); text-align: center; }
  .empty-state .icon { font-size: 2.5rem; }

  /* ── CAT EDITOR ── */
  .cat-editor { display: flex; flex-direction: column; gap: 20px; max-width: 760px; }
  .cat-name-row { display: flex; gap: 10px; align-items: center; }
  .cat-name-input {
    flex: 1;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 11px 14px;
    color: var(--text);
    font-size: 1.1rem;
    font-weight: 800;
    font-family: inherit;
    outline: none;
    transition: border-color .2s;
  }
  .cat-name-input:focus { border-color: var(--gold); }
  .section-label { font-size: .7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); font-weight: 700; }

  /* ── QUESTION CARDS ── */
  .q-list { display: flex; flex-direction: column; gap: 10px; }
  .q-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color .2s;
  }
  .q-card:focus-within { border-color: var(--border-hover); }
  .q-card-head {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 14px;
    cursor: pointer;
    user-select: none;
    background: var(--surface2);
  }
  .q-card-head:hover { background: #2a2840; }
  .q-pts-input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 10px;
    color: var(--gold);
    font-family: 'Oswald', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    width: 84px;
    text-align: center;
    outline: none;
  }
  .q-pts-input:focus { border-color: var(--gold); }
  .q-preview {
    flex: 1;
    font-size: .85rem;
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .q-preview.has-text { color: var(--text); }
  .dd-toggle-wrap { display: flex; align-items: center; gap: 6px; }
  .dd-toggle-wrap input[type=checkbox] { display: none; }
  .dd-toggle-label {
    padding: 3px 10px;
    border-radius: 99px;
    border: 1.5px solid var(--border);
    font-size: .72rem;
    font-weight: 700;
    cursor: pointer;
    transition: all .15s;
    color: var(--text-muted);
    white-space: nowrap;
  }
  .dd-toggle-wrap input:checked + .dd-toggle-label {
    background: var(--gold);
    color: #0f0e17;
    border-color: var(--gold);
  }
  .q-del { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: .9rem; padding: 4px 6px; border-radius: 4px; transition: color .15s; }
  .q-del:hover { color: var(--red); }
  .q-chevron { color: var(--text-dim); font-size: .8rem; transition: transform .2s; }
  .q-card.open .q-chevron { transform: rotate(180deg); }

  .q-card-body { padding: 16px; display: flex; flex-direction: column; gap: 14px; border-top: 1px solid var(--border); }
  .q-card-body.hidden { display: none; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field-label { font-size: .7rem; text-transform: uppercase; letter-spacing: .5px; color: var(--text-muted); font-weight: 700; }
  textarea {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 11px 13px;
    color: var(--text);
    font-size: .9rem;
    font-family: inherit;
    outline: none;
    resize: vertical;
    min-height: 72px;
    transition: border-color .2s;
    line-height: 1.5;
  }
  textarea:focus { border-color: var(--gold); }

  /* ── MEDIA ── */
  .media-section { display: flex; flex-direction: column; gap: 10px; }
  .media-input-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .media-url-input {
    flex: 1;
    min-width: 160px;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 9px 12px;
    color: var(--text);
    font-size: .85rem;
    font-family: inherit;
    outline: none;
    transition: border-color .2s;
  }
  .media-url-input:focus { border-color: var(--gold); }
  .file-upload-label {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 9px 14px;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: .85rem;
    font-weight: 600;
    cursor: pointer;
    transition: border-color .15s;
    white-space: nowrap;
    color: var(--text-muted);
  }
  .file-upload-label:hover { border-color: var(--border-hover); color: var(--text); }
  input[type=file] { display: none; }
  .media-preview-wrap { display: flex; align-items: center; gap: 10px; }
  .media-preview-thumb { max-width: 120px; max-height: 80px; border-radius: 6px; object-fit: cover; }
  .media-preview-vid { max-width: 120px; max-height: 80px; border-radius: 6px; }
  .media-type-tag {
    padding: 3px 8px;
    border-radius: 4px;
    font-size: .7rem;
    font-weight: 700;
    text-transform: uppercase;
  }
  .tag-image { background: rgba(59,130,246,.2); color: #93c5fd; }
  .tag-video { background: rgba(139,92,246,.2); color: #c4b5fd; }
  .tag-audio { background: rgba(16,185,129,.2); color: #6ee7b7; }
  .upload-bar { height: 3px; background: var(--surface2); border-radius: 99px; overflow: hidden; display: none; }
  .upload-bar-fill { height: 100%; background: var(--gold); width: 0; transition: width .2s; border-radius: 99px; }

  .add-q-row { display: flex; gap: 8px; align-items: center; }
  .add-pts-input {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 8px 12px;
    color: var(--gold);
    font-family: 'Oswald', sans-serif;
    font-size: .95rem;
    font-weight: 600;
    width: 90px;
    text-align: center;
    outline: none;
  }
  .add-pts-input:focus { border-color: var(--gold); }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    bottom: 20px; right: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 18px;
    font-size: .875rem;
    opacity: 0;
    transition: opacity .25s, transform .25s;
    transform: translateY(6px);
    pointer-events: none;
    z-index: 999;
  }
  #toast.show { opacity: 1; transform: translateY(0); }
  #toast.ok { border-color: var(--green); }
  #toast.err { border-color: var(--red); }
</style>
</head>
<body>

<div class="topbar">
  <a href="/gamemaster.html" class="topbar-back">← Zurück</a>
  <div class="topbar-divider"></div>
  <input class="topbar-title-input" id="quizTitleInput" type="text" placeholder="Quiz-Titel eingeben…" value="Mein Jeopardy Quiz">
  <div class="topbar-right">
    <span class="save-status" id="saveStatus"></span>
    <button class="btn btn-primary" onclick="saveQuiz()">Speichern</button>
  </div>
</div>

<div class="editor-body">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-section-label">Kategorien</div>
    </div>
    <div class="cat-list" id="catList"></div>
    <div class="preset-section">
      <div class="sidebar-section-label">Punkte-Preset</div>
      <div class="preset-chips">
        <div class="preset-chip" onclick="applyPreset([100,200,300,400,500])">100–500</div>
        <div class="preset-chip" onclick="applyPreset([200,400,600,800,1000])">200–1k</div>
        <div class="preset-chip" onclick="applyPreset([100,200,300,400,500,600])">6er</div>
        <div class="preset-chip" onclick="applyPreset([400,800,1200,1600,2000])">400–2k</div>
      </div>
    </div>
    <div class="sidebar-footer">
      <button class="btn btn-ghost" style="width:100%" onclick="addCategory()">+ Kategorie hinzufügen</button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main-panel" id="mainPanel">
    <div class="empty-state">
      <div class="icon">📋</div>
      <p>Keine Kategorie ausgewählt.<br>Füge links eine Kategorie hinzu.</p>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
let quiz = { id: null, title: 'Mein Jeopardy Quiz', categories: [] };
let activeCatIdx = null;

async function init() {
  const params = new URLSearchParams(location.search);
  const id = params.get('id');
  if (id) {
    try {
      const res = await fetch(`/api/quizzes/${id}`);
      if (res.ok) {
        quiz = await res.json();
        document.getElementById('quizTitleInput').value = quiz.title;
        renderSidebar();
        if (quiz.categories.length) selectCat(0);
      }
    } catch { toast('Ladefehler', 'err'); }
  }
}

function toast(msg, type = '', dur = 2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + type;
  setTimeout(() => t.className = '', dur);
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── SAVE ─────────────────────────────────────────────────────────────────────
async function saveQuiz() {
  quiz.title = document.getElementById('quizTitleInput').value.trim() || 'Mein Quiz';
  const btn = document.querySelector('.btn-primary');
  btn.disabled = true;
  try {
    let res;
    if (quiz.id) {
      res = await fetch(`/api/quizzes/${quiz.id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(quiz)
      });
    } else {
      res = await fetch('/api/quizzes', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(quiz)
      });
      const saved = await res.json();
      quiz.id = saved.id;
      history.replaceState(null, '', `?id=${quiz.id}`);
    }
    if (!res.ok) throw new Error();
    const status = document.getElementById('saveStatus');
    status.textContent = '✓ Gespeichert';
    status.className = 'save-status saved';
    setTimeout(() => { status.textContent = ''; status.className = 'save-status'; }, 2500);
  } catch { toast('Fehler beim Speichern', 'err'); }
  btn.disabled = false;
}

// ── CATEGORIES ───────────────────────────────────────────────────────────────
function addCategory() {
  quiz.categories.push({ name: 'Neue Kategorie', questions: defaultQuestions() });
  renderSidebar();
  selectCat(quiz.categories.length - 1);
}

function defaultQuestions() {
  return [200, 400, 600, 800, 1000].map(v => ({ value: v, question: '', answer: '', isDailyDouble: false, mediaType: null, mediaUrl: null }));
}

function deleteCat(idx) {
  if (!confirm('Kategorie löschen?')) return;
  quiz.categories.splice(idx, 1);
  activeCatIdx = Math.min(activeCatIdx, quiz.categories.length - 1);
  renderSidebar();
  if (quiz.categories.length === 0) {
    activeCatIdx = null;
    document.getElementById('mainPanel').innerHTML = `<div class="empty-state"><div class="icon">📋</div><p>Keine Kategorie ausgewählt.</p></div>`;
  } else {
    selectCat(activeCatIdx);
  }
}

function selectCat(idx) {
  activeCatIdx = idx;
  renderSidebar();
  renderCatEditor(idx);
}

function renderSidebar() {
  document.getElementById('catList').innerHTML = quiz.categories.map((c, i) => `
    <div class="cat-item ${i === activeCatIdx ? 'active' : ''}" onclick="selectCat(${i})">
      <div class="cat-item-dot"></div>
      <span class="cat-item-name">${esc(c.name)}</span>
      <button class="cat-item-del" onclick="event.stopPropagation();deleteCat(${i})">✕</button>
    </div>`).join('');
}

function applyPreset(values) {
  if (activeCatIdx === null) return toast('Erst eine Kategorie auswählen', 'err');
  const cat = quiz.categories[activeCatIdx];
  cat.questions = values.map(v => {
    const ex = cat.questions.find(q => q.value === v);
    return ex || { value: v, question: '', answer: '', isDailyDouble: false, mediaType: null, mediaUrl: null };
  });
  renderCatEditor(activeCatIdx);
  toast('Preset angewendet', 'ok');
}

// ── CAT EDITOR ───────────────────────────────────────────────────────────────
function renderCatEditor(idx) {
  const cat = quiz.categories[idx];
  document.getElementById('mainPanel').innerHTML = `
    <div class="cat-editor">
      <div class="cat-name-row">
        <input class="cat-name-input" type="text" placeholder="Kategorie-Name…"
               value="${esc(cat.name)}" oninput="quiz.categories[${idx}].name=this.value;renderSidebar()">
      </div>
      <div>
        <div class="section-label" style="margin-bottom:10px">Fragen</div>
        <div class="q-list" id="qList"></div>
        <div class="add-q-row" style="margin-top:12px">
          <button class="btn btn-ghost" onclick="addQuestion(${idx})">+ Frage</button>
          <input class="add-pts-input" type="number" id="newQPts" placeholder="Punkte" value="200" min="0" step="100">
        </div>
      </div>
    </div>`;
  renderQuestions(idx);
}

function renderQuestions(catIdx) {
  const list = document.getElementById('qList');
  if (!list) return;
  list.innerHTML = quiz.categories[catIdx].questions.map((q, qi) => buildQCard(catIdx, qi, q)).join('');
}

function buildQCard(ci, qi, q) {
  const hasText = !!q.question;
  const mediaTag = q.mediaUrl ? `<span class="media-type-tag ${q.mediaType?.startsWith('image')?'tag-image':q.mediaType?.startsWith('video')?'tag-video':'tag-audio'}">${q.mediaType?.startsWith('image')?'📷':q.mediaType?.startsWith('video')?'🎬':'🎵'}</span>` : '';
  const preview = buildPreview(q);
  return `
  <div class="q-card open" id="qcard-${ci}-${qi}">
    <div class="q-card-head" onclick="toggleCard('${ci}-${qi}')">
      <input class="q-pts-input" type="number" value="${q.value}" min="0" step="100"
             onclick="event.stopPropagation()"
             oninput="quiz.categories[${ci}].questions[${qi}].value=parseInt(this.value)||0">
      <span class="q-preview ${hasText?'has-text':''}">${hasText ? esc(q.question.substring(0,55))+(q.question.length>55?'…':'') : 'Keine Frage'} ${mediaTag}</span>
      <label class="dd-toggle-wrap" onclick="event.stopPropagation()">
        <input type="checkbox" ${q.isDailyDouble?'checked':''} onchange="quiz.categories[${ci}].questions[${qi}].isDailyDouble=this.checked">
        <span class="dd-toggle-label">★ DD</span>
      </label>
      <button class="q-del" onclick="event.stopPropagation();deleteQ(${ci},${qi})">✕</button>
      <span class="q-chevron">▼</span>
    </div>
    <div class="q-card-body" id="qbody-${ci}-${qi}">
      <div class="field">
        <div class="field-label">Frage (Spieler sehen das)</div>
        <textarea placeholder="Frage eingeben…"
                  oninput="updateQ(${ci},${qi},'question',this.value)">${esc(q.question||'')}</textarea>
      </div>
      <div class="field">
        <div class="field-label">Antwort (nur Gamemaster)</div>
        <textarea placeholder="Antwort eingeben…" style="min-height:52px"
                  oninput="updateQ(${ci},${qi},'answer',this.value)">${esc(q.answer||'')}</textarea>
      </div>
      <div class="field">
        <div class="field-label">Media (optional — Bild, Video oder Audio)</div>
        <div class="media-section">
          <div class="media-input-row">
            <label class="file-upload-label" for="file-${ci}-${qi}">📎 Datei hochladen</label>
            <input type="file" id="file-${ci}-${qi}" accept="image/*,video/*,audio/*" onchange="uploadFile(${ci},${qi},this)">
            <input class="media-url-input" type="text" placeholder="Oder URL einfügen…"
                   value="${esc(q.mediaUrl||'')}" oninput="setUrl(${ci},${qi},this.value)">
            ${q.mediaUrl ? `<button class="btn btn-danger-soft btn-sm" onclick="clearMedia(${ci},${qi})">Entfernen</button>` : ''}
          </div>
          <div class="upload-bar" id="upbar-${ci}-${qi}"><div class="upload-bar-fill" id="upfill-${ci}-${qi}"></div></div>
          <div id="mpreview-${ci}-${qi}">${preview}</div>
        </div>
      </div>
    </div>
  </div>`;
}

function buildPreview(q) {
  if (!q.mediaUrl) return '';
  const t = q.mediaType || guessType(q.mediaUrl);
  if (!t) return `<p style="color:var(--text-muted);font-size:.8rem;margin-top:6px">🔗 ${esc(q.mediaUrl)}</p>`;
  if (t.startsWith('image')) return `<div class="media-preview-wrap" style="margin-top:6px"><img class="media-preview-thumb" src="${esc(q.mediaUrl)}" alt=""></div>`;
  if (t.startsWith('video')) return `<div class="media-preview-wrap" style="margin-top:6px"><video class="media-preview-vid" src="${esc(q.mediaUrl)}" controls></video></div>`;
  if (t.startsWith('audio')) return `<div style="margin-top:6px"><audio src="${esc(q.mediaUrl)}" controls style="width:100%;max-width:320px"></audio></div>`;
  return '';
}

function guessType(url) {
  const ext = url.split('.').pop().toLowerCase().split('?')[0];
  if (['jpg','jpeg','png','gif','webp','svg'].includes(ext)) return 'image/'+ext;
  if (['mp4','webm','mov','avi'].includes(ext)) return 'video/'+ext;
  if (['mp3','wav','ogg','aac','m4a'].includes(ext)) return 'audio/'+ext;
  return null;
}

function toggleCard(key) {
  const card = document.getElementById('qcard-'+key);
  const body = document.getElementById('qbody-'+key);
  card.classList.toggle('open');
  body.classList.toggle('hidden');
}

function updateQ(ci, qi, field, val) {
  quiz.categories[ci].questions[qi][field] = val;
  const preview = document.querySelector(`#qcard-${ci}-${qi} .q-preview`);
  if (preview && field === 'question') {
    preview.className = 'q-preview' + (val ? ' has-text' : '');
    preview.textContent = val ? val.substring(0,55)+(val.length>55?'…':'') : 'Keine Frage';
  }
}

function addQuestion(ci) {
  const val = parseInt(document.getElementById('newQPts')?.value) || 200;
  quiz.categories[ci].questions.push({ value: val, question: '', answer: '', isDailyDouble: false, mediaType: null, mediaUrl: null });
  renderQuestions(ci);
}

function deleteQ(ci, qi) {
  if (!confirm('Frage löschen?')) return;
  quiz.categories[ci].questions.splice(qi, 1);
  renderQuestions(ci);
}

// ── MEDIA ────────────────────────────────────────────────────────────────────
async function uploadFile(ci, qi, input) {
  const file = input.files[0];
  if (!file) return;
  const bar = document.getElementById(`upbar-${ci}-${qi}`);
  const fill = document.getElementById(`upfill-${ci}-${qi}`);
  bar.style.display = 'block';
  fill.style.width = '0%';

  let prog = 0;
  const ticker = setInterval(() => { prog = Math.min(prog + 12, 80); fill.style.width = prog + '%'; }, 120);

  try {
    const fd = new FormData();
    fd.append('file', file);
    const res = await fetch('/api/upload', { method: 'POST', body: fd });
    clearInterval(ticker);
    fill.style.width = '100%';
    if (!res.ok) throw new Error();
    const data = await res.json();
    quiz.categories[ci].questions[qi].mediaUrl = data.url;
    quiz.categories[ci].questions[qi].mediaType = data.type;
    setTimeout(() => {
      bar.style.display = 'none';
      document.getElementById(`mpreview-${ci}-${qi}`).innerHTML = buildPreview(quiz.categories[ci].questions[qi]);
      renderQuestions(ci);
      toast('Datei hochgeladen', 'ok');
    }, 300);
  } catch {
    clearInterval(ticker);
    bar.style.display = 'none';
    toast('Upload fehlgeschlagen', 'err');
  }
}

function setUrl(ci, qi, url) {
  quiz.categories[ci].questions[qi].mediaUrl = url;
  quiz.categories[ci].questions[qi].mediaType = guessType(url);
  document.getElementById(`mpreview-${ci}-${qi}`).innerHTML = buildPreview(quiz.categories[ci].questions[qi]);
}

function clearMedia(ci, qi) {
  quiz.categories[ci].questions[qi].mediaUrl = null;
  quiz.categories[ci].questions[qi].mediaType = null;
  renderQuestions(ci);
}

document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); saveQuiz(); }
});

init();
</script>
