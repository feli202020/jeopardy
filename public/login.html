<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jeopardy – Gamemaster Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Oswald:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e17;
    --surface: #1a1828;
    --surface2: #232134;
    --border: #2e2b45;
    --gold: #f5c842;
    --gold-light: #fde68a;
    --gold-glow: rgba(245,200,66,.18);
    --red: #f87171;
    --text: #f0eeff;
    --text-muted: #7c7a96;
    --radius: 14px;
    --radius-sm: 8px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-font-smoothing: antialiased;
  }

  .login-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
    padding: 20px;
    width: 100%;
  }

  .logo {
    font-family: 'Oswald', sans-serif;
    font-size: 3.5rem;
    font-weight: 700;
    letter-spacing: 8px;
    color: var(--gold);
    text-shadow: 0 0 60px var(--gold-glow);
    text-align: center;
  }
  .logo-sub {
    text-align: center;
    color: var(--text-muted);
    font-size: .85rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 6px;
  }

  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 36px 32px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 4px 40px rgba(0,0,0,.5);
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .card-title {
    font-size: .75rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-muted);
    font-weight: 700;
    text-align: center;
  }

  .field { display: flex; flex-direction: column; gap: 8px; }
  .field-label {
    font-size: .75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .5px;
    color: var(--text-muted);
  }
  input[type=password] {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 13px 16px;
    color: var(--text);
    font-size: 1.1rem;
    font-family: inherit;
    letter-spacing: 4px;
    outline: none;
    transition: border-color .2s;
    width: 100%;
  }
  input[type=password]:focus { border-color: var(--gold); }

  .btn-login {
    width: 100%;
    padding: 14px;
    border-radius: var(--radius-sm);
    border: none;
    background: var(--gold);
    color: #0f0e17;
    font-size: 1rem;
    font-weight: 800;
    font-family: inherit;
    cursor: pointer;
    transition: all .15s;
    box-shadow: 0 2px 16px rgba(245,200,66,.3);
  }
  .btn-login:hover:not(:disabled) {
    background: var(--gold-light);
    box-shadow: 0 4px 24px rgba(245,200,66,.45);
    transform: translateY(-1px);
  }
  .btn-login:disabled { opacity: .4; cursor: not-allowed; transform: none; }

  .error-msg {
    color: var(--red);
    font-size: .85rem;
    text-align: center;
    min-height: 18px;
  }

  .back-link {
    text-align: center;
    font-size: .85rem;
    color: var(--text-muted);
  }
  .back-link a { color: var(--gold); text-decoration: none; }
  .back-link a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="login-wrap">
  <div>
    <div class="logo">JEOPARDY</div>
    <div class="logo-sub">Gamemaster Login</div>
  </div>

  <div class="login-card">
    <div class="card-title">Nur für Gamemaster</div>
    <div class="field">
      <div class="field-label">Passwort</div>
      <input type="password" id="pwInput" placeholder="••••••" autocomplete="current-password" autofocus>
    </div>
    <div id="errorMsg" class="error-msg"></div>
    <button class="btn-login" id="loginBtn" onclick="doLogin()">Einloggen →</button>
  </div>

  <div class="back-link"><a href="/">← Zurück zur Startseite</a></div>
</div>

<script>
document.getElementById('pwInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

async function doLogin() {
  const pw = document.getElementById('pwInput').value;
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('errorMsg');
  err.textContent = '';
  btn.disabled = true;
  btn.textContent = '…';

  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw })
    });
    const data = await res.json();
    if (data.ok) {
      window.location.href = '/gamemaster.html';
    } else {
      err.textContent = data.error || 'Falsches Passwort';
      btn.disabled = false;
      btn.textContent = 'Einloggen →';
    }
  } catch {
    err.textContent = 'Verbindungsfehler';
    btn.disabled = false;
    btn.textContent = 'Einloggen →';
  }
}
</script>
</body>
</html>
